name: Weekly Fitness Report

on:
  # Run automatically every Sunday at 20:00 UTC
  schedule:
    - cron: '0 20 * * 0'

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual check-in'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit the report back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate weekly report
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        run: |
          python scripts/fetch_hevy.py

      - name: Commit and push report
        run: |
          git config --local user.email "fitness-tracker[bot]@users.noreply.github.com"
          git config --local user.name "Fitness Tracker Bot"
          git add weekly_reports/ data/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Weekly report — $(date +'%Y-W%V') [automated]"
          git push
